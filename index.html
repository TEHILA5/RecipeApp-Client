<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="src/assets/icons/chef-hat.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sweet&Treat — Dessert Recipes</title>
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Nunito:wght@300;400;600;700&family=Pacifico&display=swap" rel="stylesheet" />
  
  <style>
    /* Loading Screen Styles */
    #loading-screen {
      position: fixed;
      inset: 0;
      background: #1a0a12;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.6s ease, visibility 0.6s;
    }
    
    #loading-screen.hidden {
      opacity: 0;
      visibility: hidden;
    }
    
    .loading-logo-img {
      width: 380px;
      max-width: 90vw;
      object-fit: contain;
      animation: loadBounce 1.2s ease infinite alternate;
    }
    
    @keyframes loadBounce {
      from { transform: translateY(0); }
      to { transform: translateY(-12px); }
    }
    
    .loading-bar-wrap {
      width: 260px;
      height: 6px;
      background: rgba(255, 255, 255, 0.12);
      border-radius: 999px;
      overflow: hidden;
    }
    
    .loading-bar {
      height: 100%;
      background: linear-gradient(90deg, #e8799a, #e8c49a);
      border-radius: 999px;
      animation: barFill 1.8s ease forwards;
    }
    
    @keyframes barFill {
      from { width: 0%; }
      to { width: 100%; }
    }
  </style>
</head>
<body>
  <!-- Loading Screen -->
  <div id="loading-screen">
    <img src="/src/assets/images/loading.png" alt="Loading..." class="loading-logo-img" />
    <div class="loading-bar-wrap">
      <div class="loading-bar"></div>
    </div>
  </div>

  <!-- React App Root -->
  <div id="root"></div>
  
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
